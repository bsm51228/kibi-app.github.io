const G = "#2EBD7A", DARK = "#0D1F17", MID = "#1A3329", DARK2 = "#060F0B";
const RED = "#EF4444", AMBER = "#F59E0B";

const css = `
  @import url('https://fonts.googleapis.com/css2?family=Lora:wght@400;600;700&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: ${DARK2}; }
  ::-webkit-scrollbar { width: 0; height: 0; }
  input, select, button, textarea { font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif; }
  .serif { font-family: 'Lora', Georgia, serif; }
  @keyframes fadeIn   { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
  @keyframes fadeUp   { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
  @keyframes pulse    { 0%,100% { opacity:1; } 50% { opacity:.4; } }
  @keyframes spin     { to { transform: rotate(360deg); } }
  @keyframes slideUp  { from { transform:translateY(100%); } to { transform:translateY(0); } }
  @keyframes ping     { 0% { transform:scale(1); opacity:.8; } 100% { transform:scale(2.2); opacity:0; } }
  @keyframes liveGlow { 0%,100% { box-shadow:0 0 0 0 rgba(46,189,122,.4); } 50% { box-shadow:0 0 0 8px rgba(46,189,122,0); } }
  @keyframes shimmer  { 0%{background-position:-200% 0} 100%{background-position:200% 0} }
  .btn-press:active   { transform: scale(0.97); }
`;

/* ════════════════════════════════════════════════════
   PITSTOP PLANNING ENGINE
   CO₂ formula: miles × (8.887 kg / vehicle_mpg)
   For EVs: miles × (0.386 kg / (MPGe/33.7))
════════════════════════════════════════════════════ */
const CO2_PER_GAL = 8.887; // kg CO₂ per gallon of gasoline
const EV_GRID_KG_PER_KWH = 0.386; // US average grid intensity

function calcCO2(miles, mpg, isEV) {
  if (isEV) return parseFloat((miles * EV_GRID_KG_PER_KWH * (33.7 / mpg)).toFixed(3));
  return parseFloat((miles * CO2_PER_GAL / mpg).toFixed(3));
}

function calcRange(mpg, isEV) {
  // Gas: assume 15-gal tank. EV: assume 250mi range
  return isEV ? 250 : Math.round(mpg * 15);
}

function planPitstops(totalMiles, rangeMiles, prefs) {
  // Kibi's pitstop planning algorithm:
  // 1. Place stops every ~80% of range (leave buffer)
  // 2. From candidate exits near that distance, pick highest scored
  // 3. Filter exits by user preferences

  const stopInterval = Math.round(rangeMiles * 0.80);
  const stops = [];
  let milesAccountedFor = 0;
  
  while (milesAccountedFor + stopInterval < totalMiles) {
    const target = milesAccountedFor + stopInterval;
    // Find best exit near target distance
    const candidates = PITSTOP_EXITS.filter(e => 
      e.dist >= target - 40 && e.dist <= target + 40
    );
    if (candidates.length > 0) {
      // Sort by score and user preferences
      const best = candidates.sort((a, b) => {
        let scoreA = a.score;
        let scoreB = b.score;
        if (prefs.accessible) { scoreA += a.amenities.accessible ? 5 : -10; scoreB += b.amenities.accessible ? 5 : -10; }
        if (prefs.family) { scoreA += a.amenities.family ? 3 : -5; scoreB += b.amenities.family ? 3 : -5; }
        return scoreB - scoreA;
      })[0];
      stops.push(best);
      milesAccountedFor = best.dist;
    } else {
      milesAccountedFor = target;
    }
  }
  return stops;
}

/* ════════════════════════════════════════════════════
   ACTIVE TRIP (background tracking simulation)
   v1: NO ads, NO Kibits — pure carbon tracking
════════════════════════════════════════════════════ */
function ActiveTrip({trip, onEnd}) {
  const [progress, setProgress] = useState(0);
  const [co2, setCo2] = useState(0);
  const [showNotif, setShowNotif] = useState(false);
  const ref = useRef(null);
  
  const totalMiles = parseFloat(trip.miles) || 12.4;
  const mpg = trip.mpg || 28;
  const isEV = trip.isEV || false;

  useEffect(()=>{
    ref.current = setInterval(()=>{
      setProgress(p=>{
        if (p >= 1) { clearInterval(ref.current); return 1; }
        const delta = 0.006;
        const newP = Math.min(p + delta, 1);
        setCo2(c => parseFloat((c + calcCO2(totalMiles * delta, mpg, isEV)).toFixed(4)));
        return newP;
      });
    }, 200);
    setTimeout(()=>setShowNotif(true), 4000);
    setTimeout(()=>setShowNotif(false), 8000);
    return ()=>clearInterval(ref.current);
  }, []);

  const milesLeft = (totalMiles * (1-progress)).toFixed(1);
  const minsLeft  = Math.max(1, Math.round(parseInt(trip.time||"23") * (1-progress)));
  const totalCO2  = calcCO2(totalMiles, mpg, isEV);

  return (
    <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden",position:"relative",background:DARK}}>
      {/* Live activity banner */}
      <div style={{background:"linear-gradient(135deg,rgba(46,189,122,0.15),rgba(46,189,122,0.04))",borderBottom:"1px solid rgba(46,189,122,0.18)",padding:"10px 16px 10px"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <div style={{width:8,height:8,borderRadius:"50%",background:G,animation:"liveGlow 2s infinite"}}/>
            <span style={{color:G,fontSize:11,fontWeight:700,letterSpacing:"1.2px"}}>TRACKING IN BACKGROUND</span>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:5}}>
            <Icon n="arrow" s={12} c={G}/>
            <span style={{color:"white",fontSize:12,fontWeight:700,fontFamily:"Lora,serif"}}>kibi</span>
          </div>
        </div>
        <div style={{display:"flex",gap:18}}>
          <div><div style={{color:"rgba(255,255,255,.35)",fontSize:10,marginBottom:1}}>To</div><div style={{color:"white",fontSize:13,fontWeight:600}}>{trip.destination}</div></div>
          <div><div style={{color:"rgba(255,255,255,.35)",fontSize:10,marginBottom:1}}>Via</div><div style={{color:"white",fontSize:13,fontWeight:600}}>{trip.provider}</div></div>
          <div style={{marginLeft:"auto",textAlign:"right"}}>
            <div style={{color:"rgba(255,255,255,.35)",fontSize:10,marginBottom:1}}>ETA</div>
            <div style={{color:G,fontSize:13,fontWeight:700}}>{minsLeft} min</div>
          </div>
        </div>
      </div>
      {/* Progress bar */}
      <div style={{height:3,background:"rgba(255,255,255,.04)"}}>
        <div style={{height:"100%",width:`${progress*100}%`,background:`linear-gradient(90deg,${G},#5BC8F5)`,transition:"width .3s"}}/>
      </div>
      {/* Map */}
      <div style={{position:"relative",flex:1,overflow:"hidden"}}>
        <MapBg/>
        {/* Animated car */}
        <div style={{position:"absolute",bottom:`${15+progress*58}%`,left:`calc(50% + ${Math.sin(progress*18)*10}px)`,zIndex:5,transition:"bottom .6s,left .25s"}}>
          <div style={{position:"relative"}}>
            <div style={{position:"absolute",inset:-8,borderRadius:"50%",background:"rgba(46,189,122,0.18)",animation:"ping 1.8s infinite"}}/>
            <div style={{width:18,height:18,borderRadius:"50%",background:G,border:"3px solid white",boxShadow:"0 2px 10px rgba(0,0,0,.5)"}}/>
          </div>
        </div>
        {/* CO2 live badge */}
        <div style={{position:"absolute",top:12,right:14,background:"rgba(13,31,23,0.92)",border:"1px solid rgba(46,189,122,0.2)",borderRadius:10,padding:"6px 10px",zIndex:6}}>
          <div style={{color:"rgba(255,255,255,.35)",fontSize:9,letterSpacing:"1px"}}>CO₂ SO FAR</div>
          <div style={{color:G,fontSize:14,fontWeight:800}}>{co2.toFixed(2)} kg</div>
        </div>
      </div>
      {/* Stats + controls */}
      <div style={{background:"rgba(11,26,18,0.97)",backdropFilter:"blur(20px)",borderTopLeftRadius:22,borderTopRightRadius:22,border:"1px solid rgba(46,189,122,0.12)",padding:"16px 20px 20px"}}>
        <div style={{display:"flex",justifyContent:"space-around",marginBottom:16}}>
          {[
            {l:"Miles Left",v:milesLeft,u:"mi"},
            {l:"CO₂ This Trip",v:co2.toFixed(2),u:"kg",c:G},
            {l:"Total Trip CO₂",v:totalCO2.toFixed(2),u:"kg"},
          ].map((s,i)=>(
            <div key={i} style={{textAlign:"center"}}>
              <div style={{color:"rgba(255,255,255,.3)",fontSize:9,letterSpacing:"1.2px",textTransform:"uppercase",marginBottom:3}}>{s.l}</div>
              <div style={{color:s.c||"white",fontSize:19,fontWeight:800}}>{s.v}<span style={{fontSize:10,color:"rgba(255,255,255,.3)",marginLeft:2}}>{s.u}</span></div>
            </div>
          ))}
        </div>
        {progress >= 1
          ? <Btn onClick={onEnd} style={{background:`linear-gradient(135deg,${G},#1a9960)`}}>View Trip Summary →</Btn>
          : <Btn onClick={onEnd} variant="danger">End Trip Early</Btn>
        }
      </div>
      {/* Pitstop notification toast */}
      {showNotif && (
        <div style={{position:"absolute",top:130,left:14,right:14,zIndex:50,animation:"slideUp .3s ease",background:"rgba(11,26,18,0.97)",border:"1px solid rgba(46,189,122,0.25)",borderRadius:16,padding:"14px 16px"}}>
          <div style={{display:"flex",gap:12,alignItems:"center"}}>
            <div style={{width:38,height:38,borderRadius:11,background:"rgba(46,189,122,0.12)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:19,flexShrink:0}}>⛽</div>
            <div style={{flex:1}}>
              <div style={{color:"white",fontSize:13,fontWeight:600}}>Cheap gas 0.4 mi ahead</div>
              <div style={{color:"rgba(255,255,255,.35)",fontSize:12}}>Shell · $3.19/gal · great ratings nearby</div>
            </div>
            <Icon n="chev" s={15} c="rgba(46,189,122,0.5)"/>
          </div>
        </div>
      )}
    </div>
  );
}

const TABS = [
  {id:"navigate",label:"Navigate",icon:"map"},
  {id:"eco",label:"Eco",icon:"leaf"},
  {id:"kibits",label:"Kibits",icon:"lock"},
  {id:"profile",label:"Profile",icon:"user"},
];

function KibiApp() {
  // phase: onboarding | vehicle | preferences | permissions | app
  const [phase,    setPhase]    = useState("onboarding");
  const [tab,      setTab]      = useState("navigate");
  const [vehicle,  setVehicle]  = useState(null);
  const [userPrefs,setUserPrefs]= useState({food:[],prefs:{family:false,dog:false,accessible:false,safe:true,bathroom:true,ev:false}});
  const [activeTrip,   setActiveTrip]   = useState(null);
  const [completedTrip,setCompletedTrip]= useState(null);
  const [showHistory,  setShowHistory]  = useState(false);

  const handleVehicleDone = (v) => { setVehicle(v); setPhase("preferences"); };
  const handlePrefsDone   = (p) => { setUserPrefs(p); setPhase("permissions"); };
  const handlePermsDone   = ()  => { setPhase("app"); };
  const handleStartTrip   = (t) => { setActiveTrip(t); };
  const handleEndTrip     = ()  => { setCompletedTrip(activeTrip); setActiveTrip(null); };
  const handleTripDone    = ()  => { setCompletedTrip(null); setTab("navigate"); };

  const renderTabContent = () => {
    if (activeTrip)    return <ActiveTrip trip={activeTrip} onEnd={handleEndTrip}/>;
    if (completedTrip) return <TripSummary trip={completedTrip} onDone={handleTripDone}/>;
    switch(tab) {
      case "navigate": return showHistory
        ? <TripHistory onBack={()=>setShowHistory(false)}/>
        : <NavigateTab onStartTrip={handleStartTrip} vehicle={vehicle} prefs={userPrefs?.prefs}/>;
      case "eco":      return <EcoTab vehicle={vehicle}/>;
      case "kibits":   return <KibitsTab/>;
      case "profile":  return <ProfileTab vehicle={vehicle} setVehicle={setVehicle} userPrefs={userPrefs} setUserPrefs={setUserPrefs}/>;
      default:         return null;
    }
  };

  return (
    <>
      <style>{css}</style>
      <div style={{display:"flex",alignItems:"center",justifyContent:"center",minHeight:"100vh",background:DARK2,padding:"20px 0",fontFamily:"-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif"}}>

        {/* Phone shell */}
        <div style={{width:390,height:844,borderRadius:52,background:DARK,overflow:"hidden",position:"relative",flexShrink:0,boxShadow:"0 40px 100px rgba(0,0,0,.95),0 0 0 1px rgba(46,189,122,0.1),inset 0 0 0 2px rgba(255,255,255,.03)"}}>
          <StatusBar/>

          {/* Onboarding phases */}
          {phase==="onboarding" && <div style={{position:"absolute",inset:0,zIndex:50}}><Onboarding onDone={()=>setPhase("vehicle")}/></div>}
          {phase==="vehicle"    && <div style={{position:"absolute",inset:0,zIndex:50}}><VehicleSetup onDone={handleVehicleDone}/></div>}
          {phase==="preferences"&& <div style={{position:"absolute",inset:0,zIndex:50}}><PreferencesSetup onDone={handlePrefsDone}/></div>}
          {phase==="permissions"&& <div style={{position:"absolute",inset:0,zIndex:50}}><Permissions onDone={handlePermsDone}/></div>}

          {/* Main app */}
          {phase==="app" && (
            <div style={{display:"flex",flexDirection:"column",height:"100%"}}>
              {/* Header */}
              {!activeTrip && !completedTrip && (
                <div style={{paddingTop:42,paddingBottom:10,paddingLeft:18,paddingRight:18,borderBottom:"1px solid rgba(46,189,122,0.06)",background:DARK,flexShrink:0}}>
                  <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                    <div style={{display:"flex",alignItems:"center",gap:7}}>
                      <Icon n="arrow" s={17} c={G}/>
                      <span className="serif" style={{color:"white",fontSize:19,fontWeight:700}}>kibi</span>
                    </div>
                    <div style={{display:"flex",gap:8,alignItems:"center"}}>
                      {tab==="navigate" && !showHistory && (
                        <button onClick={()=>setShowHistory(true)} style={{background:"rgba(46,189,122,0.07)",border:"1px solid rgba(46,189,122,0.12)",borderRadius:10,padding:"6px 11px",color:"rgba(255,255,255,.4)",fontSize:12,cursor:"pointer",display:"flex",alignItems:"center",gap:5}}>
                          <Icon n="road" s={13}/>History
                        </button>
                      )}
                      {vehicle?.make && (
                        <div style={{background:"rgba(46,189,122,0.07)",border:"1px solid rgba(46,189,122,0.15)",borderRadius:10,padding:"5px 10px",display:"flex",alignItems:"center",gap:5}}>
                          <Icon n="car" s={12} c={G}/>
                          <span style={{color:"rgba(255,255,255,.45)",fontSize:11,fontWeight:500}}>{vehicle.year} {vehicle.make}</span>
                        </div>
                      )}
                    </div>
                  </div>
                </div>
              )}

              {/* Tab content */}
              <div style={{flex:1,overflow:"hidden",display:"flex",flexDirection:"column"}}>
                {renderTabContent()}
              </div>

              {/* Tab bar */}
              {!activeTrip && !completedTrip && (
                <div style={{flexShrink:0,background:"rgba(10,24,16,0.98)",borderTop:"1px solid rgba(46,189,122,0.08)",paddingBottom:28}}>
                  <div style={{display:"flex"}}>
                    {TABS.map(t=>(
                      <button key={t.id} onClick={()=>{setTab(t.id);setShowHistory(false);}}
                        style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3,padding:"10px 0",background:"none",border:"none",cursor:"pointer",color:tab===t.id?G:"rgba(255,255,255,0.2)",transition:"color .15s"}}>
                        <Icon n={t.icon} s={22}/>
                        <span style={{fontSize:10,fontWeight:tab===t.id?600:400,letterSpacing:"0.3px"}}>{t.label}</span>
                      </button>
                    ))}
                  </div>
                </div>
              )}
            </div>
          )}
        </div>

        {/* Side legend */}
        <div style={{marginLeft:36,maxWidth:210,animation:"fadeIn .5s ease"}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:16}}>
            <Icon n="arrow" s={20} c={G}/>
            <span className="serif" style={{color:"white",fontSize:22,fontWeight:700}}>kibi</span>
            <span style={{background:"rgba(46,189,122,0.15)",border:"1px solid rgba(46,189,122,0.25)",borderRadius:6,padding:"2px 7px",color:G,fontSize:10,fontWeight:700}}>v1</span>
          </div>
          <div style={{color:"rgba(255,255,255,.28)",fontSize:12,lineHeight:1.9,marginBottom:16}}>
            Interactive prototype — EPA vehicle database powered
          </div>
          <div style={{borderTop:"1px solid rgba(46,189,122,0.08)",paddingTop:14}}>
            {[
              {e:"👆",l:"Tap through 4 onboarding slides"},
              {e:"🚗",l:"Select from 200+ real EPA vehicles"},
              {e:"🥗",l:"Set food & trip preferences"},
              {e:"📍",l:"Allow location (step 3 of 3)"},
              {e:"🗺️",l:"Pick a destination (try 245 mi trip)"},
              {e:"🧠",l:"Kibi plans optimal pitstops"},
              {e:"📱",l:"Choose Google, Apple, or Waze"},
              {e:"📡",l:"Watch live CO₂ tracking"},
              {e:"✅",l:"End trip → see summary"},
              {e:"🌿",l:"Explore Eco lifetime dashboard"},
              {e:"👤",l:"Edit vehicle & preferences in Profile"},
            ].map((s,i)=>(
              <div key={i} style={{display:"flex",alignItems:"flex-start",gap:9,marginBottom:9}}>
                <span style={{fontSize:13,flexShrink:0}}>{s.e}</span>
                <span style={{color:"rgba(255,255,255,.32)",fontSize:12,lineHeight:1.5}}>{s.l}</span>
              </div>
            ))}
          </div>
          <div style={{marginTop:14,background:"rgba(46,189,122,0.05)",border:"1px solid rgba(46,189,122,0.12)",borderRadius:12,padding:"11px 13px",fontSize:11,color:"rgba(255,255,255,.28)",lineHeight:1.75}}>
            <strong style={{color:"rgba(46,189,122,.6)"}}>v1 Scope:</strong> Navigate + pitstop planning, EPA-backed CO₂ tracking, Eco dashboard, Profile. Kibits deferred to v2 per product spec.
          </div>
        </div>
      </div>
    </>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<KibiApp/>);
  </script>
</body>
</html>
