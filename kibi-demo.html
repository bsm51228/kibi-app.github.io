function planPitstops(totalMiles,rangeMiles,tripPrefs){
  const interval=Math.round(rangeMiles*SAFETY);
  const result=[];let covered=0;
  while(covered+interval<totalMiles){
    const target=covered+interval;
    const bucket=EXITS.filter(e=>e.dist>=target-55&&e.dist<=target+55);
    if(bucket.length>0){
      const ranked=bucket.sort((a,b)=>{
        let sa=a.score,sb=b.score;
        if(tripPrefs?.includes("Wheelchair Accessible")){sa+=a.amenities.accessible?5:-12;sb+=b.amenities.accessible?5:-12;}
        if(tripPrefs?.includes("Family-Friendly")){sa+=a.amenities.family?3:-6;sb+=b.amenities.family?3:-6;}
        return sb-sa;
      }).slice(0,3);
      result.push({candidates:ranked,selectedIndex:0,accepted:false});
      covered=ranked[0].dist;
    }else{covered=target;}
  }
  return result;
}

          <span style={{color:TEXT_M,fontSize:11}}>{stop.mealLabel}</span>
          <span style={{color:TEXT_M,fontSize:11}}>~{stop.duration} min stop</span>
        </div>
        {stop.food?.[0]&&<div style={{color:TEXT_M,fontSize:11,marginBottom:6}}>🍔 {stop.food[0].n} &nbsp;·&nbsp; ⭐ {stop.food[0].r}</div>}
        {stop.tier===2&&<div style={{background:"rgba(245,158,11,.08)",border:"1px solid rgba(245,158,11,.2)",borderRadius:8,padding:"5px 10px",marginBottom:8}}><span style={{color:AMBER,fontSize:11}}>Limited services — gas available</span></div>}
        {stop.amenities?.accessible===false&&<div style={{background:"rgba(239,68,68,.07)",border:"1px solid rgba(239,68,68,.18)",borderRadius:8,padding:"5px 10px",marginBottom:8}}><span style={{color:RED,fontSize:11}}>♿ May not be accessible</span></div>}
        <div style={{display:"flex",gap:8}}>
          {interval.accepted
            ?<div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",gap:6,padding:"10px",background:"rgba(46,189,122,.1)",borderRadius:10,border:"1px solid rgba(46,189,122,.25)"}}><Icon n="check" s={14} c={G}/><span style={{color:G,fontSize:13,fontWeight:600}}>Accepted</span></div>
            :<button className="btn-p" onClick={()=>onAccept(idx)} style={{flex:1,padding:"10px",background:G,color:DARK2,border:"none",borderRadius:10,fontSize:13,fontWeight:700,cursor:"pointer"}}>Accept</button>
          }
          {interval.candidates.length>1&&<button className="btn-p" onClick={()=>onSwap(idx)} style={{padding:"10px 14px",background:"rgba(255,255,255,.05)",border:"1px solid rgba(255,255,255,.1)",borderRadius:10,color:"rgba(255,255,255,.5)",fontSize:13,cursor:"pointer",display:"flex",alignItems:"center",gap:5}}><Icon n="swap" s={13}/>Swap</button>}
        </div>
        <button onClick={()=>onReport(stop)} style={{background:"none",border:"none",color:"rgba(255,255,255,.22)",fontSize:11,cursor:"pointer",padding:"7px 0 2px",display:"flex",alignItems:"center",gap:4}}>
          <Icon n="flag" s={11} c="rgba(255,255,255,.22)"/>Report this stop
        </button>
      </div>
    </div>
  );
}


/* ── NAVIGATE TAB ────────────────────────────────────── */
const DESTS=[
  {emoji:"🏙️",label:"Nashville, TN",sub:"Long drive · 487 mi · ~7h 22min",miles:487,time:"7h 22min"},
  {emoji:"🏙️",label:"Cincinnati, OH",sub:"Long drive · 302 mi · ~4h 38min",miles:302,time:"4h 38min"},
  {emoji:"🏙️",label:"Indianapolis, IN",sub:"Long drive · 183 mi · ~2h 51min",miles:183,time:"2h 51min"},
  {emoji:"🏠",label:"Home",sub:"Short drive · 12.4 mi · ~23 min",miles:12.4,time:"23 min"},
];

function NavigateTab({vehicle,userPrefs,navApp,setNavApp,favs,onFav,onStartTrip}){
  const[view,setView]=useState({type:"home"});
  const[search,setSearch]=useState("");
  const[focused,setFocused]=useState(false);
  const[fuelLevel,setFuelLevel]=useState("½");
  const[showReport,setShowReport]=useState(null);
  const[toast,setToast]=useState(null);
  const[launching,setLaunching]=useState(false);
  const[showConstruct,setShowConstruct]=useState(true);
  const showToast=msg=>{setToast(msg);setTimeout(()=>setToast(null),2200);};
  const mpg=vehicle?.specs?.mpg||28;
  const isEV=vehicle?.specs?.fuel==="Electric";
  const rangeMax=vehicle?.range||calcRange(mpg,isEV);
  const currentRange=Math.round(rangeMax*(FUEL_FRAC[fuelLevel]||.5));
  const filtered=search?DESTS.filter(d=>d.label.toLowerCase().includes(search.toLowerCase())):DESTS;
  const handleDest=dest=>{
    if(dest.miles>80){const intervals=planPitstops(dest.miles,currentRange,userPrefs?.trip||[]);setView({type:"plan",dest,intervals});}
    else{setView({type:"navPick",dest,intervals:[]});}
  };
  const acceptStop=i=>setView(v=>({...v,intervals:v.intervals.map((iv,j)=>j===i?{...iv,accepted:true}:iv)}));
  const swapStop=i=>setView(v=>({...v,intervals:v.intervals.map((iv,j)=>j===i?{...iv,selectedIndex:(iv.selectedIndex+1)%iv.candidates.length}:iv)}));

  const etaStr=useMemo(()=>{
    if(!view.dest)return"";
    const now=new Date();const hrs=view.dest.miles/65;const stopMins=(view.intervals?.length||0)*20;
    const arr=new Date(now.getTime()+(hrs*60+stopMins)*60000);
    const h=arr.getHours(),m=String(arr.getMinutes()).padStart(2,"0");
    const ampm=h>=12?"pm":"am";const h12=h>12?h-12:h||12;
    const st=(view.intervals?.length||0)>0?`${view.intervals.length} stop${view.intervals.length>1?"s":""}`:null;
    return`Arriving ~${h12}:${m}${ampm}${st?" · "+st:""} · ${Math.round(view.dest.miles)} miles`;
  },[view]);

  // HOME
  if(view.type==="home") return(
    <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden",position:"relative"}}>
      <div style={{flex:1,overflowY:"auto",padding:"12px 18px 24px"}}>
        <div className="serif" style={{color:TEXT_P,fontSize:28,fontWeight:700,marginBottom:14,lineHeight:1.2}}>Where to today?</div>
        {/* Search */}
        <div style={{position:"relative",marginBottom:10}}>
          <div style={{position:"absolute",left:14,top:"50%",transform:"translateY(-50%)"}}><Icon n="search" s={17} c={focused?G:"rgba(255,255,255,.3)"}/></div>
          <input value={search} onChange={e=>setSearch(e.target.value)} onFocus={()=>setFocused(true)} onBlur={()=>setFocused(false)} placeholder="Search destinations..." style={{width:"100%",background:MID,border:`1px solid ${focused?G:"rgba(46,189,122,.2)"}`,borderRadius:14,padding:"13px 14px 13px 44px",color:TEXT_P,fontSize:15,outline:"none",transition:"border-color .2s"}}/>
        </div>
        {/* Vehicle + fuel */}
        {vehicle&&(
          <div style={{display:"flex",alignItems:"center",gap:8,padding:"10px 14px",background:SURFACE,borderRadius:12,border:"1px solid rgba(46,189,122,.1)",marginBottom:14}}>
            <Icon n="car" s={14} c={G}/>
            <span style={{color:TEXT_S,fontSize:12,fontWeight:500}}>{vehicle.year} {vehicle.make} {vehicle.model}</span>
            <span style={{color:"rgba(255,255,255,.2)"}}>·</span>
            {vehicle.fuelMode==="gauge"?(
              <div style={{display:"flex",gap:4}}>
                {FUEL_LEVELS.map(l=>(
                  <button key={l} className="chip" onClick={()=>setFuelLevel(l)} style={{padding:"3px 7px",borderRadius:6,fontSize:11,fontWeight:fuelLevel===l?700:400,border:`1px solid ${fuelLevel===l?AMBER:"rgba(255,255,255,.08)"}`,background:fuelLevel===l?"rgba(245,158,11,.12)":"transparent",color:fuelLevel===l?AMBER:"rgba(255,255,255,.3)",cursor:"pointer",transition:"all .15s"}}>{l}</button>
                ))}
              </div>
            ):<span style={{color:TEXT_M,fontSize:12}}>~{currentRange} mi range</span>}
            <span style={{marginLeft:"auto",color:TEXT_M,fontSize:11}}>~{currentRange} mi</span>
          </div>
        )}
        {/* Destinations */}
        <SLabel>Suggested Destinations</SLabel>
        {filtered.map((d,i)=>(
          <div key={i} onClick={()=>handleDest(d)} style={{display:"flex",alignItems:"center",gap:12,padding:"13px 14px",background:SURFACE,border:"1px solid rgba(46,189,122,.08)",borderRadius:14,marginBottom:8,cursor:"pointer"}}>
            <div style={{width:38,height:38,borderRadius:12,background:"rgba(46,189,122,.08)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0}}>{d.emoji}</div>
            <div style={{flex:1}}>
              <div style={{color:TEXT_P,fontSize:14,fontWeight:600}}>{d.label}</div>
              <div style={{color:TEXT_M,fontSize:12,marginTop:1}}>{d.sub}</div>
            </div>
            {d.miles>80&&<div style={{background:"rgba(46,189,122,.08)",border:"1px solid rgba(46,189,122,.15)",borderRadius:6,padding:"2px 7px"}}><span style={{color:G,fontSize:10,fontWeight:600}}>Plan stops</span></div>}
            <Icon n="chev" s={14} c="rgba(46,189,122,.4)"/>
          </div>
        ))}
        {/* Recent trips */}
        <SLabel style={{marginTop:8}}>Recent Trips</SLabel>
        {SAMPLE_TRIPS.slice(0,2).map((t,i)=>(
          <div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 12px",background:SURFACE,border:"1px solid rgba(255,255,255,.06)",borderRadius:12,marginBottom:7,cursor:"pointer"}}>
            <Icon n="road" s={15} c="rgba(255,255,255,.25)"/>
            <div style={{flex:1}}>
              <div style={{color:TEXT_S,fontSize:13}}>{t.origin.split(",")[0]} → {t.destination.split(",")[0]}</div>
              <div style={{color:TEXT_M,fontSize:11,marginTop:1}}>{t.date} · {t.dist}</div>
            </div>
            <Icon n="chev" s={13} c="rgba(255,255,255,.2)"/>
          </div>
        ))}
      </div>
    </div>
  );

  // PLANNING
  if(view.type==="plan"){const{dest,intervals}=view;return(
    <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden",position:"relative"}}>
      <div style={{padding:"12px 16px 10px",borderBottom:"1px solid rgba(46,189,122,.08)",flexShrink:0}}>
        <BackBtn onBack={()=>setView({type:"home"})}/>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{width:36,height:36,borderRadius:11,background:"rgba(46,189,122,.1)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>{dest.emoji}</div>
          <div><div style={{color:TEXT_P,fontSize:15,fontWeight:700}}>{dest.label}</div><div style={{color:TEXT_M,fontSize:12}}>{dest.sub}</div></div>
        </div>
      </div>
      <div style={{flex:1,overflowY:"auto",padding:"12px 16px 16px"}}>
        {showConstruct&&(
          <div style={{background:"rgba(245,158,11,.08)",border:`1px solid ${AMBER}`,borderRadius:12,padding:"11px 14px",marginBottom:12,display:"flex",alignItems:"flex-start",gap:10}}>
            <span style={{fontSize:16,flexShrink:0,marginTop:1}}>🚧</span>
            <div style={{flex:1}}><span style={{color:AMBER,fontSize:13,fontWeight:600}}>Construction delays detected</span><div style={{color:"rgba(245,158,11,.65)",fontSize:12,marginTop:2}}>I-65 near mile 340 — may add 30+ min</div></div>
            <button onClick={()=>setShowConstruct(false)} style={{background:"none",border:"none",cursor:"pointer",flexShrink:0}}><Icon n="x" s={14} c="rgba(245,158,11,.5)"/></button>
          </div>
        )}
        <div style={{background:"linear-gradient(135deg,rgba(46,189,122,.13),rgba(46,189,122,.03))",border:"1px solid rgba(46,189,122,.2)",borderRadius:14,padding:"12px 14px",marginBottom:14}}>
          <div style={{color:G,fontSize:12,fontWeight:700,marginBottom:4}}>🧠 Kibi's Pitstop Plan</div>
          <div style={{color:TEXT_M,fontSize:12,lineHeight:1.6}}>
            Based on your {vehicle?.year||""} {vehicle?.make||""} {vehicle?.model||""} (~{currentRange} mi range)
            {intervals.length>0?`, Kibi found ${intervals.length} optimized stop${intervals.length>1?"s":""}. Accept or swap each one below.`:". You can reach this destination without stopping."}
          </div>
          {!isEV&&<div style={{color:"rgba(255,255,255,.28)",fontSize:12,marginTop:4}}>Est. ~${Math.round((dest.miles/mpg)*3.28)} in gas (Midwest avg $3.28/gal)</div>}
        </div>
        {/* Route */}
        <div style={{position:"relative",padding:"4px 0",marginBottom:12}}>
          <div style={{position:"absolute",left:19,top:24,bottom:24,width:2,background:"rgba(46,189,122,.15)",borderRadius:1}}/>
          <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:16}}>
            <div style={{width:38,height:38,borderRadius:"50%",background:G,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,zIndex:1}}>📍</div>
            <div><div style={{color:TEXT_P,fontSize:13,fontWeight:600}}>Chicago, IL</div><div style={{color:TEXT_M,fontSize:11}}>Starting point</div></div>
          </div>
          {intervals.map((iv,i)=>(
            <div key={i} style={{marginBottom:6}}>
              <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:8}}>
                <div style={{width:38,height:38,borderRadius:"50%",background:SURFACE,border:`2px solid ${G}`,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,zIndex:1}}><span style={{color:G,fontSize:13,fontWeight:700}}>{i+1}</span></div>
                <div style={{color:TEXT_M,fontSize:11}}>Stop {i+1} · ~{iv.candidates[iv.selectedIndex].dist} mi from start</div>
              </div>
              <div style={{paddingLeft:50}}>
                <PitstopCard interval={iv} idx={i} onAccept={acceptStop} onSwap={swapStop} favs={favs} onFav={onFav} onReport={s=>{setShowReport(s);}}/>
              </div>
            </div>
          ))}
          <div style={{display:"flex",alignItems:"center",gap:12}}>
            <div style={{width:38,height:38,borderRadius:"50%",background:SURFACE,border:"2px solid rgba(46,189,122,.4)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,zIndex:1,fontSize:18}}>🏁</div>
            <div><div style={{color:TEXT_P,fontSize:13,fontWeight:600}}>{dest.label}</div><div style={{color:TEXT_M,fontSize:11}}>{dest.miles} mi from start</div></div>
          </div>
        </div>
        <Btn onClick={()=>setView({type:"navPick",dest,intervals})} style={{marginTop:8}}>Launch Trip →</Btn>
        <div style={{textAlign:"center",marginTop:8}}><span style={{color:TEXT_S,fontSize:13}}>{etaStr}</span></div>

      {/* Report sheet */}

        <div style={{position:"absolute",inset:0,background:"rgba(0,0,0,.65)",zIndex:150,display:"flex",flexDirection:"column",justifyContent:"flex-end"}} onClick={()=>setShowReport(null)}>
          <div onClick={e=>e.stopPropagation()} style={{background:SURFACE,borderTopLeftRadius:22,borderTopRightRadius:22,padding:"20px 20px 40px",animation:"slideUp .26s ease"}}>
            <div style={{width:32,height:4,background:"rgba(255,255,255,.12)",borderRadius:2,margin:"0 auto 16px"}}/>
            <div style={{color:TEXT_P,fontSize:15,fontWeight:600,marginBottom:14}}>Report {showReport.name}</div>
            {["Closed","Unsafe","Wrong info","Other"].map(r=>(

    </div>
  );}

  // NAV PICK
  if(view.type==="navPick"){const{dest,intervals}=view;
    const navOpts=[{k:"Google Maps",e:"🗺️",h:intervals.length>1?"All waypoints loaded at once":"Single destination"},{k:"Apple Maps",e:"🍎",h:intervals.length>1?"All waypoints loaded at once":"Single destination"},{k:"Waze",e:"🚗",h:intervals.length>1?"Stop-by-stop (Waze limitation)":"Single destination"}];
    return(
    <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
      <div style={{padding:"12px 16px 10px",borderBottom:"1px solid rgba(46,189,122,.08)",flexShrink:0}}>
        <BackBtn onBack={()=>setView({type:"plan",dest,intervals})}/>
        <h2 className="serif" style={{color:TEXT_P,fontSize:20,fontWeight:700}}>Launch in...</h2>
        <p style={{color:TEXT_M,fontSize:13,marginTop:3}}>kibi hands off waypoints. Your nav handles directions.</p>
      </div>
      <div style={{flex:1,padding:"16px 18px"}}>
        {navOpts.map(n=>(
          <div key={n.k} onClick={()=>{if(launching)return;setLaunching(true);setNavApp(n.k);setTimeout(()=>{setLaunching(false);onStartTrip({destination:dest.label,origin:"Chicago, IL",provider:n.k,dist:`${dest.miles} mi`,time:dest.time,miles:dest.miles,mpg,isEV,stops:intervals.length,co2Total:calcCO2(dest.miles,mpg,isEV)});},1400);}} style={{display:"flex",alignItems:"center",gap:14,padding:"16px",background:navApp===n.k?"rgba(46,189,122,.1)":SURFACE,border:`1px solid ${navApp===n.k?"rgba(46,189,122,.3)":"rgba(255,255,255,.07)"}`,borderRadius:16,marginBottom:10,cursor:launching?"default":"pointer",transition:"all .2s"}}>
            <span style={{fontSize:28}}>{n.e}</span>
            <div style={{flex:1}}><div style={{color:TEXT_P,fontSize:15,fontWeight:600}}>{n.k}</div><div style={{color:TEXT_M,fontSize:12,marginTop:2}}>{n.h}</div></div>
            {navApp===n.k&&<Icon n="check" s={18} c={G}/>}
            {n.k==="Waze"&&intervals.length>1&&<span style={{background:"rgba(245,158,11,.1)",border:"1px solid rgba(245,158,11,.2)",borderRadius:6,padding:"2px 6px",color:AMBER,fontSize:10,fontWeight:600}}>1-by-1</span>}
          </div>
        ))}
        {launching&&<div style={{textAlign:"center",padding:"16px 0"}}><div style={{width:20,height:20,border:"2px solid rgba(46,189,122,.2)",borderTopColor:G,borderRadius:"50%",animation:"spin .8s linear infinite",margin:"0 auto 10px"}}/><div style={{color:TEXT_M,fontSize:13}}>Handing off waypoints…</div></div>}
      </div>
    </div>
  );}
  return null;
}


/* ── ACTIVE TRIP ─────────────────────────────────────── */
function ActiveTrip({trip,onEnd,onNeedStop}){
  const[progress,setProgress]=useState(0);
  const[co2,setCo2]=useState(0);
  const[showNotif,setShowNotif]=useState(false);
  const ref=useRef();
  const miles=parseFloat(trip?.miles)||487;
  const mpg=trip?.mpg||22;
  const isEV=trip?.isEV||false;
  const totalCO2=calcCO2(miles,mpg,isEV);
  useEffect(()=>{
    ref.current=setInterval(()=>{
      setProgress(p=>{
        if(p>=1){clearInterval(ref.current);return 1;}
        const d=0.005;const np=Math.min(p+d,1);
        setCo2(c=>parseFloat((c+calcCO2(miles*d,mpg,isEV)).toFixed(3)));
        return np;
      });
    },200);
    setTimeout(()=>setShowNotif(true),4500);
    setTimeout(()=>setShowNotif(false),8000);
    return()=>clearInterval(ref.current);
  },[]);
  const milesLeft=(miles*(1-progress)).toFixed(1);
  const minsLeft=Math.max(1,Math.round((miles/65)*60*(1-progress)));
  const now=new Date();const eta=new Date(now.getTime()+minsLeft*60000);
  const h=eta.getHours(),m=String(eta.getMinutes()).padStart(2,"0");
  const etaStr=`~${h>12?h-12:h||12}:${m}${h>=12?"pm":"am"} arrival`;
  return(
    <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden",position:"relative",background:DARK2}}>
      {/* Live banner */}
      <div style={{background:"linear-gradient(135deg,rgba(46,189,122,.15),rgba(46,189,122,.04))",borderBottom:"1px solid rgba(46,189,122,.18)",padding:"10px 16px",flexShrink:0}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:7}}>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <div style={{width:8,height:8,borderRadius:"50%",background:G,animation:"liveGlow 2s infinite"}}/>
            <span style={{color:G,fontSize:11,fontWeight:700,letterSpacing:"1.2px"}}>TRACKING IN BACKGROUND</span>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:5}}>
            <Icon n="bird" s={12} c={G}/><span style={{color:"white",fontSize:12,fontWeight:700,fontFamily:"Lora,serif"}}>kibi</span>
          </div>
        </div>
        <div style={{display:"flex",gap:16,alignItems:"center"}}>
          <div><div style={{color:"rgba(255,255,255,.35)",fontSize:10,marginBottom:1}}>To</div><div style={{color:"white",fontSize:13,fontWeight:600}}>{trip.destination}</div></div>
          <div><div style={{color:"rgba(255,255,255,.35)",fontSize:10,marginBottom:1}}>Via</div><div style={{color:"white",fontSize:13,fontWeight:600}}>{trip.provider}</div></div>
          <div style={{marginLeft:"auto",textAlign:"right"}}><div style={{color:"rgba(255,255,255,.35)",fontSize:10,marginBottom:1}}>ETA</div><div style={{color:G,fontSize:13,fontWeight:700}}>{etaStr}</div></div>
        </div>
      </div>
      {/* Progress bar */}
      <div style={{height:3,background:"rgba(255,255,255,.04)",flexShrink:0}}>
        <div style={{height:"100%",width:`${progress*100}%`,background:`linear-gradient(90deg,${G},#5BC8F5)`,transition:"width .3s"}}/>
      </div>
      {/* Map */}
      <div style={{position:"relative",flex:1,overflow:"hidden"}}>
        <MapBg/>
        <div style={{position:"absolute",bottom:`${15+progress*58}%`,left:`calc(50% + ${Math.sin(progress*18)*10}px)`,zIndex:5,transition:"bottom .6s,left .25s"}}>
          <div style={{position:"relative"}}>
            <div style={{position:"absolute",inset:-8,borderRadius:"50%",background:"rgba(46,189,122,.18)",animation:"ping 1.8s infinite"}}/>
            <div style={{width:18,height:18,borderRadius:"50%",background:G,border:"3px solid white",boxShadow:"0 2px 10px rgba(0,0,0,.5)"}}/>
          </div>
        </div>
        <div style={{position:"absolute",top:12,right:14,background:"rgba(6,15,11,.92)",border:"1px solid rgba(46,189,122,.2)",borderRadius:10,padding:"6px 10px",zIndex:6}}>
          <div style={{color:"rgba(255,255,255,.35)",fontSize:9,letterSpacing:"1px"}}>CO₂ SO FAR</div>
          <div style={{color:G,fontSize:14,fontWeight:800}}>{co2.toFixed(2)} kg</div>
        </div>
        {/* Need a Stop FAB */}
        <button onClick={onNeedStop} style={{position:"absolute",bottom:12,right:14,zIndex:7,background:SURFACE,border:`1px solid rgba(46,189,122,.3)`,borderRadius:14,padding:"10px 16px",color:G,fontSize:13,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",gap:6}}>
          <span style={{fontSize:16}}>⛽</span>Need a Stop?
        </button>

      {/* Preferences */}
      <SLabel>Preferences</SLabel>
      <div onClick={()=>setEditPrefs(true)} style={{display:"flex",alignItems:"center",gap:12,padding:"14px",background:SURFACE,border:"1px solid rgba(255,255,255,.07)",borderRadius:16,marginBottom:10,cursor:"pointer"}}>
        <div style={{width:42,height:42,borderRadius:12,background:"rgba(46,189,122,.08)",display:"flex",alignItems:"center",justifyContent:"center"}}><Icon n="filter" s={20} c={G}/></div>
        <div style={{flex:1}}>
          <div style={{color:TEXT_P,fontSize:15,fontWeight:600}}>Food & Trip Preferences</div>
          <div style={{color:TEXT_M,fontSize:12,marginTop:2}}>{(userPrefs?.food||[]).length+(userPrefs?.trip||[]).length} preferences set</div>
        </div>
        <Icon n="edit" s={16} c="rgba(255,255,255,.3)"/>
      </div>
      {/* Navigation app */}
      <SLabel>Navigation App</SLabel>
      <div style={{background:SURFACE,border:"1px solid rgba(255,255,255,.07)",borderRadius:16,padding:"14px",marginBottom:10}}>
        <div style={{color:TEXT_S,fontSize:13,marginBottom:10}}>Preferred navigation app</div>
        <div style={{display:"flex",gap:8}}>
          {["Google Maps","Apple Maps","Waze"].map(a=>{const on=navApp===a;return(
            <button key={a} className="chip" onClick={()=>setNavApp(a)} style={{flex:1,padding:"9px 4px",borderRadius:10,fontSize:12,fontWeight:on?600:400,border:`1px solid ${on?G:"rgba(46,189,122,.15)"}`,background:on?"rgba(46,189,122,.14)":"transparent",color:on?G:"rgba(255,255,255,.38)",cursor:"pointer",transition:"all .18s"}}>{a.split(" ")[0]}</button>
          );})}
        </div>
      </div>
      {/* Kibits Coming Soon */}
      <SLabel>Coming Soon</SLabel>
      <div style={{background:SURFACE,border:"1px solid rgba(255,255,255,.07)",borderRadius:16,padding:"14px",marginBottom:10,display:"flex",alignItems:"center",gap:12,opacity:.7}}>
        <div style={{width:42,height:42,borderRadius:12,background:"rgba(255,255,255,.05)",display:"flex",alignItems:"center",justifyContent:"center"}}><Icon n="lock" s={18} c="rgba(255,255,255,.3)"/></div>
        <div style={{flex:1}}>
          <div style={{color:TEXT_P,fontSize:15,fontWeight:600}}>Kibits</div>
          <div style={{color:TEXT_M,fontSize:12,marginTop:2}}>Social features & friends — coming in v2</div>
        </div>
        <span style={{background:"rgba(46,189,122,.12)",border:"1px solid rgba(46,189,122,.25)",borderRadius:99,padding:"2px 8px",color:G,fontSize:9,fontWeight:700,letterSpacing:".8px"}}>COMING SOON</span>
      </div>
      {/* About Kibi */}
      <SLabel>About Kibi</SLabel>
      <div style={{background:SURFACE,border:"1px solid rgba(255,255,255,.07)",borderRadius:16,padding:"14px",marginBottom:10}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
          <span style={{color:TEXT_S,fontSize:13}}>App Version</span><span style={{color:TEXT_M,fontSize:13}}>1.0.0 (1)</span>
        </div>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:10}}>
          <span style={{color:TEXT_S,fontSize:13}}>EPA Vehicle Data</span><span style={{color:TEXT_M,fontSize:13}}>49,806 vehicles</span>
        </div>
        <div style={{borderTop:"1px solid rgba(255,255,255,.06)",paddingTop:10,marginTop:4}}>
          <div style={{color:"rgba(255,255,255,.25)",fontSize:11,lineHeight:1.7}}>
            Map data © <span style={{color:"rgba(46,189,122,.55)"}}>OpenStreetMap</span> contributors, available under the Open Database License. · <span style={{color:"rgba(46,189,122,.55)"}}>openstreetmap.org/copyright</span>
          </div>
        </div>
        <div style={{display:"flex",gap:8,marginTop:12}}>
          <button style={{flex:1,padding:"9px",background:"rgba(255,255,255,.05)",border:"1px solid rgba(255,255,255,.08)",borderRadius:10,color:"rgba(255,255,255,.4)",fontSize:12,cursor:"pointer"}}>Privacy Policy</button>
          <button style={{flex:1,padding:"9px",background:"rgba(239,68,68,.08)",border:"1px solid rgba(239,68,68,.18)",borderRadius:10,color:RED,fontSize:12,cursor:"pointer"}}>Report an Issue</button>
        </div>
      </div>
    </div>
  );
}

/* ── TABS ────────────────────────────────────────────── */
const TABS=[{id:"navigate",l:"Navigate",icon:"map"},{id:"eco",l:"Eco",icon:"leaf"},{id:"favorites",l:"Favorites",icon:"heart"},{id:"profile",l:"Profile",icon:"user"}];

/* ── ROOT APP ────────────────────────────────────────── */
function KibiApp(){
  const[phase,setPhase]=useState("onboarding"); // onboarding|vehicle|prefs|perms|earlyAccess|app
  const[tab,setTab]=useState("navigate");
  const[vehicle,setVehicle]=useState(null);
  const[userPrefs,setUserPrefs]=useState({food:[],trip:[]});
  const[navApp,setNavApp]=useState("Google Maps");
  const[activeTrip,setActiveTrip]=useState(null);
  const[completedTrip,setCompletedTrip]=useState(null);
  const[showSummary,setShowSummary]=useState(false);
  const[showShare,setShowShare]=useState(false);
  const[showEndConfirm,setShowEndConfirm]=useState(false);
  const[showEmergency,setShowEmergency]=useState(false);
  const[favs,setFavs]=useState([]);
  const[historyTrip,setHistoryTrip]=useState(null);

  const toggleFav=stop=>{
    setFavs(f=>f.some(x=>x.id===stop.id)?f.filter(x=>x.id!==stop.id):[...f,stop]);
  };
  const handleStartTrip=t=>{setActiveTrip(t);};
  const handleEndTrip=()=>{
    setShowEndConfirm(false);
    setCompletedTrip(activeTrip);
    setActiveTrip(null);
    setShowSummary(true);
  };
  const handleSummaryDone=()=>{
    setShowSummary(false);setCompletedTrip(null);setTab("navigate");
  };

  const renderContent = () => {
    switch (tab) {
      case "navigate":  return (<NavigateTab vehicle={vehicle} userPrefs={userPrefs} navApp={navApp} setNavApp={setNavApp} favs={favs} onFav={toggleFav} onStartTrip={handleStartTrip}/>);
      case "eco":       return (<EcoTab vehicle={vehicle} onViewTripSummary={t => { setHistoryTrip(t); setShowSummary(true); }}/>);
      case "favorites": return (<FavoritesTab favs={favs} onRemove={toggleFav}/>);
      case "profile":   return (<ProfileTab vehicle={vehicle} setVehicle={setVehicle} userPrefs={userPrefs} setUserPrefs={setUserPrefs} navApp={navApp} setNavApp={setNavApp}/>);
      default:          return null;
    }
  };

  return(
    <>
      <style>{css}</style>
      <div style={{display:"flex",alignItems:"center",justifyContent:"center",minHeight:"100vh",background:DARK2,fontFamily:"-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif"}}>
        {/* Phone shell */}
        <div style={{width:390,height:844,borderRadius:52,background:DARK2,overflow:"hidden",position:"relative",flexShrink:0,boxShadow:"0 40px 100px rgba(0,0,0,.95),0 0 0 1px rgba(46,189,122,.1),inset 0 0 0 2px rgba(255,255,255,.03)"}}>
          <StatusBar/>

          {/* ── ONBOARDING PHASES ── */}
          {phase==="onboarding"  &&<div style={{position:"absolute",inset:0,zIndex:50}}><Onboarding onDone={()=>setPhase("vehicle")}/></div>}
          {phase==="vehicle"     &&<div style={{position:"absolute",inset:0,zIndex:50}}><VehicleSetup onDone={v=>{if(v)setVehicle(v);setPhase("prefs");}}/></div>}
          {phase==="prefs"       &&<div style={{position:"absolute",inset:0,zIndex:50}}><PreferencesSetup onDone={p=>{if(p)setUserPrefs(p);setPhase("perms");}}/></div>}
          {phase==="perms"       &&<div style={{position:"absolute",inset:0,zIndex:50}}><Permissions onDone={()=>setPhase("earlyAccess")}/></div>}
          {phase==="earlyAccess" &&<div style={{position:"absolute",inset:0,zIndex:50}}><EarlyAccess onDone={()=>setPhase("app")}/></div>}

          {/* ── MAIN APP ── */}
          {phase==="app"&&(
            <div style={{display:"flex",flexDirection:"column",height:"100%"}}>
              {/* App header */}
              {!activeTrip&&(
                <div style={{paddingTop:42,paddingBottom:10,paddingLeft:18,paddingRight:18,borderBottom:"1px solid rgba(46,189,122,.06)",background:SURFACE,flexShrink:0}}>
                  <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                    <div style={{display:"flex",alignItems:"center",gap:7}}>
                      <Icon n="bird" s={17} c={G}/>
                      <span className="serif" style={{color:"white",fontSize:19,fontWeight:700}}>kibi</span>
                    </div>
                    {vehicle?.make&&(
                      <div style={{background:"rgba(46,189,122,.07)",border:"1px solid rgba(46,189,122,.15)",borderRadius:10,padding:"5px 10px",display:"flex",alignItems:"center",gap:5}}>
                        <Icon n="car" s={12} c={G}/>
                        <span style={{color:"rgba(255,255,255,.45)",fontSize:11,fontWeight:500}}>{vehicle.year} {vehicle.make}</span>
                      </div>
                    )}
                  </div>
                </div>
              )}
              {/* Tab content */}
              <div style={{flex:1,overflow:"hidden",display:"flex",flexDirection:"column",position:"relative"}}>
                {activeTrip
                  ?<ActiveTrip trip={activeTrip} onEnd={()=>setShowEndConfirm(true)} onNeedStop={()=>setShowEmergency(true)}/>
                  :renderContent()
                }
                {/* Emergency stop */}
                {showEmergency&&<EmergencySheet onClose={()=>setShowEmergency(false)}/>}
                {/* End trip confirm */}
                {showEndConfirm&&<EndTripConfirm onConfirm={handleEndTrip} onCancel={()=>setShowEndConfirm(false)}/>}
                {/* Trip summary modal */}
                {showSummary&&<TripSummary trip={completedTrip||historyTrip} onDone={()=>{setShowSummary(false);setHistoryTrip(null);handleSummaryDone();}} showShareCard={showShare} setShowShareCard={setShowShare}/>}
                {/* Share card */}
                {showShare&&<ShareTripCard trip={completedTrip||historyTrip} onClose={()=>setShowShare(false)}/>}
              </div>
              {/* Tab bar */}
              {!activeTrip&&(
                <div style={{flexShrink:0,background:SURFACE,borderTop:"1px solid rgba(46,189,122,.08)",paddingBottom:26}}>
                  <div style={{display:"flex"}}>
                    {TABS.map(t=>(
                      <button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3,padding:"10px 0",background:"none",border:"none",cursor:"pointer",color:tab===t.id?G:"rgba(255,255,255,.22)",transition:"color .15s",position:"relative"}}>
                        {t.id==="favorites"&&favs.length>0&&tab!=="favorites"&&<div style={{position:"absolute",top:8,right:"calc(50% - 12px)",width:7,height:7,borderRadius:"50%",background:G}}/>}
                        <Icon n={t.icon} s={22}/>
                        <span style={{fontSize:10,fontWeight:tab===t.id?600:400,letterSpacing:".3px"}}>{t.l}</span>
                      </button>
                    ))}
                  </div>
                </div>
              )}
            </div>
          )}
        </div>

        {/* Side legend */}
        <div style={{marginLeft:36,maxWidth:210,animation:"fadeIn .5s ease"}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:16}}>
            <Icon n="bird" s={20} c={G}/>
            <span className="serif" style={{color:"white",fontSize:22,fontWeight:700}}>kibi</span>
            <span style={{background:"rgba(46,189,122,.15)",border:"1px solid rgba(46,189,122,.25)",borderRadius:6,padding:"2px 7px",color:G,fontSize:10,fontWeight:700}}>v2</span>
          </div>
          <div style={{color:"rgba(255,255,255,.28)",fontSize:12,lineHeight:1.9,marginBottom:16}}>Interactive prototype — EPA vehicle database powered</div>
          <div style={{borderTop:"1px solid rgba(46,189,122,.08)",paddingTop:14}}>
            {[
              {e:"👆",l:"Tap through 4 onboarding slides + Sign in"},
              {e:"🚗",l:"Select Year → Make → Model (EPA-backed)"},
              {e:"🔋",l:"Set fuel gauge mode"},
              {e:"🥗",l:"Set food & trip preferences"},
              {e:"📍",l:"Allow location (required)"},
              {e:"✅",l:"Get through Early Access gate"},
              {e:"🗺️",l:"Try Nashville, TN (long drive)"},
              {e:"🧠",l:"Kibi plans 2 optimized pitstops"},
              {e:"↕️",l:"Accept or Swap each stop"},
              {e:"❤️",l:"Heart a stop to save it"},
              {e:"📱",l:"Choose Google, Apple, or Waze"},
              {e:"📡",l:"Watch live CO₂ tracking"},
              {e:"⛽",l:"Tap 'Need a Stop?' during trip"},
              {e:"🏁",l:"End trip → confirm → see summary"},
              {e:"📤",l:"Share boarding-pass trip card"},
              {e:"🌿",l:"Explore Eco lifetime dashboard"},
              {e:"🤍",l:"Check Favorites tab"},
              {e:"👤",l:"Edit vehicle & nav app in Profile"},
            ].map((s,i)=>(
              <div key={i} style={{display:"flex",alignItems:"flex-start",gap:9,marginBottom:9}}>
                <span style={{fontSize:13,flexShrink:0}}>{s.e}</span>
                <span style={{color:"rgba(255,255,255,.32)",fontSize:12,lineHeight:1.5}}>{s.l}</span>
              </div>
            ))}
          </div>
          <div style={{marginTop:14,background:"rgba(46,189,122,.05)",border:"1px solid rgba(46,189,122,.12)",borderRadius:12,padding:"11px 13px",fontSize:11,color:"rgba(255,255,255,.28)",lineHeight:1.75}}>
            <strong style={{color:"rgba(46,189,122,.6)"}}>v2 scope:</strong> Full 8-step onboarding, Favorites tab, Emergency Stop sheet, End-trip confirm, Trip summary modal, Share card, trip history view-from-Eco, Kibits Coming Soon. OSM attribution in About.
          </div>
        </div>
      </div>
    </>
  );
}

    const domContainer = document.getElementById('root');
    const root = ReactDOM.createRoot(domContainer);
    root.render(React.createElement(KibiApp));
  </script>
</body>
</html>
